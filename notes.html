<!DOCTYPE html>
<html data-theme="dark-gray" lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Anshul Math</title>

    <link rel="icon" href="favicon.ico">

    <link rel="stylesheet" href="style.css">

    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']]
            }
        };
    </script>

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
    </script>

    <link href="/pagefind/pagefind-ui.css" rel="stylesheet">

    <script src="/pagefind/pagefind-ui.js"></script>

</head>

<body>

    <nav class="navbar">
        <div class="nav-inner">

            <div class="nav-left">
                <a href="index.html">HOME</a>
                <a href="notes.html">NOTES</a>
                <a href="about.html">ABOUT</a>
            </div>

            <button id="theme-toggle" class="theme-toggle">◐</button>
        </div>
    </nav>

    <div class="container">
        <div class="hero">
            <div class="site-header">
                <div class="site-title">ANSHUL.MATH</div>
                <div class="site-meta">
                    <div>ISI Mathematics</div>
                    <div class="site-email">anshul.math@isi.edu</div>
                </div>
            </div>
        </div>

        <p>
            Expository mathematics, geometry,
            complex analysis, algebra, and notes.
        </p>

        <div class="notes-list">

            <h2>COURSEWORK</h2>

            <ul>
                <li>
                    <a href="pdf/algebra.pdf">Algebra</a>
                    <a href="pdf/algebra.pdf" target="_blank">[pdf]</a>
                </li>

                <li>
                    <a href="pdf/functions-spaces.pdf">Function Spaces</a>
                    <a href="pdf/functions-spaces.pdf" target="_blank">[pdf]</a>
                </li>
            </ul>

            <h2>OTHERS</h2>

            <ul>
                <li>
                    <a href="pdf/generating-functions.pdf">Generating Functions</a>
                    <a href="pdf/generating-functions.pdf" target="_blank">[pdf]</a>
                </li>

                <li>
                    <a href="pdf/perron.pdf">Perron's Formula</a>
                    <a href="pdf/perron.pdf" target="_blank">[pdf]</a>
                </li>
            </ul>

        </div>

    </div>

    <!-- Footer -->

    <div id="footer"></div>

    <script>
        fetch('/footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer').innerHTML = data;
            });
    </script>

    <script>
        const toggle = document.getElementById("theme-toggle");

        // load saved theme or default
        const savedTheme = localStorage.getItem("theme") || "light-gray";
        document.documentElement.setAttribute("data-theme", savedTheme);

        updateIcon(savedTheme);

        toggle.addEventListener("click", () => {
            const current = document.documentElement.getAttribute("data-theme");

            const next = current === "light-gray" ? "dark-gray" : "light-gray";

            document.documentElement.setAttribute("data-theme", next);
            localStorage.setItem("theme", next);

            updateIcon(next);
        });

        function updateIcon(theme) {
            toggle.textContent = theme === "dark-gray" ? "◑" : "◐";
        }
    </script>

</body>

</html>
