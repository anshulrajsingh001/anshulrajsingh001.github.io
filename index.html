    <!-- GIF ANIMATIONS AND INTERACTIONS -->
    <script>

        const wizard = document.getElementById("wizard");

        /* =========================================
           GIF PATHS
        ========================================= */

        const idleGif = "assets/images/polyKnight_idle.gif";

        const duckGif = "assets/images/polyKnight_duck.gif";

        const hurtGif = "assets/images/polyKnight_hurt.gif";

        const deadGif = "assets/images/polyKnight_dead.gif";

        const respawnGif = "assets/images/polyKnight_spawn.gif";

        const sleepGif = "assets/images/polyKnight_sleep.gif";

        /* =========================================
           SETTINGS
        ========================================= */

        const sleepDelay = 5000;

        /* =========================================
           VARIABLES
        ========================================= */

        let clickCount = 0;

        let clickTimer;

        let sleepTimer;

        let isDead = false;

        let isSleeping = false;

        /* =========================================
           START SLEEP TIMER
        ========================================= */

        startSleepTimer();

        /* =========================================
           CLICK EVENT
        ========================================= */

        wizard.addEventListener("click", () => {

            if (isDead) return;

            /* =====================================
               WAKE FROM SLEEP
            ===================================== */

            if (isSleeping) {

                isSleeping = false;

                wizard.src = idleGif;

                resetSleepTimer();

                return;
            }

            resetSleepTimer();

            clickCount++;

            clearTimeout(clickTimer);

            /* =====================================
               SINGLE CLICK → DUCK
            ===================================== */

            if (clickCount === 1) {

                wizard.src = duckGif;

                clickTimer = setTimeout(() => {

                    wizard.src = idleGif;

                    clickCount = 0;

                }, 1000);
            }

            /* =====================================
               DOUBLE CLICK → HURT
            ===================================== */

            else if (clickCount === 2) {

                clearTimeout(clickTimer);

                wizard.src = hurtGif;

                clickTimer = setTimeout(() => {

                    wizard.src = idleGif;

                    clickCount = 0;

                }, 800);
            }

            /* =====================================
               TRIPLE CLICK → DEATH
            ===================================== */

            else if (clickCount >= 3) {

                clearTimeout(clickTimer);

                clickCount = 0;

                isDead = true;

                clearTimeout(sleepTimer);

                wizard.src = deadGif;

                wizard.style.pointerEvents = "none";

                /* respawn animation */

                setTimeout(() => {

                    wizard.src = respawnGif;

                }, 1300);

                /* back to idle */

                setTimeout(() => {

                    isDead = false;

                    wizard.src = idleGif;

                    wizard.style.pointerEvents = "auto";

                    resetSleepTimer();

                }, 2400);
            }

        });

        /* =========================================
           SLEEP SYSTEM
        ========================================= */

        function startSleepTimer() {

            sleepTimer = setTimeout(() => {

                if (!isDead) {

                    isSleeping = true;

                    wizard.src = sleepGif;
                }

            }, sleepDelay);

        }

        function resetSleepTimer() {

            clearTimeout(sleepTimer);

            startSleepTimer();

        }

    </script>
